# Prism CMS — 主反向代理
# 部署目标：单台 Linux 服务器，所有服务在同一 Docker 网络中
#
# 路由规则：
#   /api/v1/*     → backend:3001  (NestJS API)
#   /uploads/*    → backend:3001  (静态上传文件)
#   /admin/       → frontend:8080 (管理后台 SPA)
#   /*            → portal:3002   (门户 Next.js SSR)

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    client_max_body_size 100M;

    # ─── upstream 定义 ──────────────────────────────────────
    upstream backend  { server backend:3001;  }
    upstream portal   { server portal:3002;   }
    upstream frontend { server frontend:8080; }

    # ─── HTTP → HTTPS 重定向（有 SSL 证书时取消注释）──────────
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    # ─── 主站点 ─────────────────────────────────────────────
    server {
        listen 80;
        # listen 443 ssl http2;
        server_name _;   # 替换为你的域名，例如 prism.example.com

        # SSL 证书（有证书时取消注释）
        # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         HIGH:!aNULL:!MD5;

        # 安全头
        add_header X-Frame-Options       SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header Referrer-Policy       strict-origin-when-cross-origin;

        # ── NestJS API ──────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── 上传文件（静态资源） ─────────────────────────────
        location /uploads/ {
            proxy_pass       http://backend;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            expires          7d;
            add_header       Cache-Control "public";
        }

        # ── 管理后台 SPA（/admin 重定向到 /admin/） ──────────
        location = /admin {
            return 301 /admin/;
        }

        # ── 管理后台 SPA（剥离 /admin 前缀后转发给 frontend 容器） ──
        location /admin/ {
            proxy_pass         http://frontend/;   # 末尾 / 剥离前缀
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Portal（Next.js SSR，兜底） ──────────────────────
        location / {
            proxy_pass         http://portal;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
        }
    }
}
